# ============================================================================
#  Chili Delivery Slot Checker — GitHub Actions Workflow
# ============================================================================
#  Runs every 30 minutes via cron, offset from :00 and :30. Also allows manual dispatch.
#
#  Required Repository Secrets:
#    TRACKING_URL   – full Chili tracking URL
#    SMTP_HOST      – SMTP server  (default: smtp.gmail.com)
#    SMTP_PORT      – SMTP port    (default: 465)
#    SMTP_USER      – sender email
#    SMTP_PASS      – app password
#    NOTIFY_EMAIL   – recipient email
# ============================================================================

name: Check Delivery Slots

on:
  schedule:
    # Every 30 minutes, offset from the busiest boundaries
    - cron: '7,37 * * * *'
  workflow_dispatch:          # Allow manual runs from the Actions tab
    inputs:
      life_signal:
        description: 'Send a life signal email on this manual run'
        required: false
        default: false
        type: boolean

jobs:
  check-slot:
    runs-on: ubuntu-latest
    timeout-minutes: 5        # Hard cap to prevent runaway billing

    steps:
      # ── 1. Checkout the repo ───────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ─────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── 3. Install dependencies ───────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Restore persisted state (last-known date) ──────────────────
      #    We use the Actions cache so the baseline date survives across runs.
      - name: Restore last-known date
        uses: actions/cache@v4
        with:
          path: .last-known-date.json
          key: slot-checker-state-${{ github.run_id }}
          restore-keys: slot-checker-state-

      # ── 5. Run the slot checker ───────────────────────────────────────
      - name: Run slot checker
        env:
          TRACKING_URL: ${{ secrets.TRACKING_URL }}
          SMTP_HOST:    ${{ secrets.SMTP_HOST }}
          SMTP_PORT:    ${{ secrets.SMTP_PORT }}
          SMTP_USER:    ${{ secrets.SMTP_USER }}
          SMTP_PASS:    ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          PARSING_MODE: browser
          LIFE_SIGNAL_ENABLED: true
          LIFE_SIGNAL_TZ: Asia/Jerusalem
          LIFE_SIGNAL_HOUR: 10
          LIFE_SIGNAL_MINUTE: 0
          LIFE_SIGNAL_WINDOW_MINUTES: 15
          LIFE_SIGNAL_FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.life_signal }}
        run: node check-slots.js
